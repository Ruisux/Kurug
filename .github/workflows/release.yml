name: Publicar Kurug (escritorio)

# Se dispara al subir una etiqueta de versión, p. ej.:  git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: chat-app/web
        run: npm ci

      - name: Compilar y publicar (electron-builder)
        working-directory: chat-app/web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # URL del servidor (variable del repo KURUG_SERVER), se hornea en la SPA
          # para que la app sepa con qué servidor hablar. Sin proxy en escritorio.
          VITE_KURUG_SERVER: ${{ vars.KURUG_SERVER || 'https://kurug.duckdns.org' }}
        run: npm run electron:build -- --publish always

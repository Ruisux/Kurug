appId: com.kurug.app
productName: Kurug

directories:
  output: release

# Qué se empaqueta (los node_modules de producción se incluyen solos).
files:
  - electron/**/*
  - dist/**/*
  - package.json

# Auto-update por GitHub Releases (electron-updater lee latest.yml del release).
# releaseType: release -> publica el release directamente (no como borrador).
publish:
  provider: github
  owner: Ruisux
  repo: Kurug
  releaseType: release

win:
  target: nsis
  icon: electron/icons/icon.ico
# oneClick = instalador de UN paso, el ÚNICO que soporta bien la instalación
# silenciosa del auto-update. Con el asistido (oneClick: false) la app se
# cerraba, el instalador no alcanzaba a reemplazar el .exe en uso y se relanzaba
# la versión VIEJA: "se reinicia y no actualiza". perMachine: false instala en
# %LOCALAPPDATA%\Programs (por usuario), así no pide permisos de administrador.
# No usar allowToChangeInstallationDirectory: es incompatible con oneClick.
nsis:
  oneClick: true
  perMachine: false

mac:
  target: dmg
  icon: electron/icons/icon.icns
  category: public.app-category.social-networking

linux:
  target:
    - AppImage
  icon: electron/icons/icon.png
  category: Network
  maintainer: Ruisux

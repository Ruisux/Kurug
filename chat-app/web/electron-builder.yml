appId: com.kurug.app
productName: Kurug

directories:
  output: release

# Qué se empaqueta (los node_modules de producción se incluyen solos).
files:
  - electron/**/*
  - dist/**/*
  - package.json

# Auto-update por GitHub Releases (electron-updater lee latest.yml del release).
# releaseType: release -> publica el release directamente (no como borrador).
publish:
  provider: github
  owner: Ruisux
  repo: Kurug
  releaseType: release

win:
  target: nsis
  icon: electron/icons/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  target: dmg
  icon: electron/icons/icon.icns
  category: public.app-category.social-networking

linux:
  target:
    - AppImage
  icon: electron/icons/icon.png
  category: Network
  maintainer: Ruisux

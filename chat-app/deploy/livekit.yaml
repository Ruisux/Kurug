# Configuración de LiveKit para el server casero (router + DuckDNS).
# Documentación: https://docs.livekit.io/home/self-hosting/deployment/
#
# IMPORTANTE: cambia la clave (keys) antes de usar.

port: 7880                 # HTTP/WebSocket de señalización (lo proxea Caddy a wss)

rtc:
  # Puerto TCP de respaldo cuando el UDP del cliente está bloqueado.
  tcp_port: 7881
  # UN SOLO puerto UDP para todo el media (mucho más fácil de abrir en el router
  # que un rango). Reenvía UDP 7882 -> este PC.
  udp_port: 7882
  # Que LiveKit detecte su IP PÚBLICA por STUN y la anuncie a los clientes.
  # Con router + dominio es lo correcto (tu IP de casa, que DuckDNS sigue).
  use_external_ip: true

# Claves de la API. key/secret deben COINCIDIR con LIVEKIT_API_KEY/SECRET del
# backend (.env) y del bot. Genera el secret con:
#   python -c "import secrets; print(secrets.token_hex(32))"
keys:
  kurug: CAMBIA_ESTE_SECRET_LARGO_Y_ALEATORIO

logging:
  level: info
